# nginx fronting config for llm-agent-console (D-05 single origin).
#
# nginx serves the built SPA at / (SPA fallback) AND reverse-proxies /api/* to
# the Go BFF on bff:8090 — same origin, no CORS.
#
# D-06 (hard constraint): a fronting proxy now ALWAYS sits in front of the BFF,
# so SSE-buffering hardening here is MANDATORY. The SSE location below disables
# buffering + gzip and raises proxy_read_timeout; without it nginx silently
# batches the stream (works on localhost, breaks through the proxy). flowd/chat
# emit no heartbeat and the BFF injects none, so idle-period survival rides on
# the raised proxy_read_timeout.

# Defense-in-depth: keep gzip off globally so a stray gzip directive can never
# re-compress (and thus buffer) an SSE response. The per-location `gzip off` on
# the SSE block is the primary control; this is the belt to its braces.
gzip off;

server {
    listen 80;
    server_name _;

    # Serve the built SPA with SPA-router fallback.
    root /usr/share/nginx/html;
    index index.html;

    # SSE location — MUST appear BEFORE the general /api/ block, otherwise the
    # plain /api/ block shadows it and the SSE routes lose `proxy_buffering off`
    # (T-01-02 [BLOCKING]: wrong ordering silently re-buffers SSE).
    #
    # Matches any /api/* path containing "stream": /api/stream/test (Phase 1) and
    # later /api/flow/*/run/stream, /api/flow/*/runs/*/replay, /api/chat/stream.
    location ~* ^/api/.*stream {
        proxy_pass http://bff:8090;
        proxy_http_version 1.1;

        # D-06: kill buffering — the critical trio. proxy_buffering off and
        # gzip off are mandatory; with either on, nginx batches the stream.
        proxy_buffering off;
        proxy_cache off;
        gzip off;

        # Pass the BFF's anti-buffering hint through unmodified.
        proxy_pass_header X-Accel-Buffering;

        # D-06: raised idle timeout — flowd/chat emit no heartbeat and a single
        # slow LLM/tool step can exceed 60s. Cover 60+ minute runs.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Plain HTTP/1.1 SSE — NOT a WebSocket upgrade. Empty Connection header.
        proxy_set_header Connection '';
    }

    # General BFF proxy (non-streaming REST). Short read timeout is fine here.
    location /api/ {
        proxy_pass http://bff:8090;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # BFF healthcheck passthrough (used by the compose healthcheck).
    location /healthz {
        proxy_pass http://bff:8090;
    }

    # SPA fallback — any non-API path serves index.html for client routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
